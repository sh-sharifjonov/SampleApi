name: CI/CD ASP.NET Web API
on:
  push:
    branches: [ "master" ]

jobs:
  format-check:
    name: Format Check Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet format --verify-no-changes --verbosity diagnostic

  auto-fix:
    name: Auto Fix Formatting
    runs-on: ubuntu-latest
    needs: format-check
    if: failure()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet format
      - uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: apply dotnet format"
          title: "style: fix code formatting"
          body: "Автоматическое исправление форматирования через `dotnet format`"
          branch: auto/dotnet-format

  build:
    name: Build Stage
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test --verbosity normal

  publish:
    name: Publish Stage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet publish -c Release -o ./publish
      - uses: actions/upload-artifact@v4
        with:
          name: SampleApi
          path: ./publish
